version: '3.8'

services:
  db:
    image: postgres:15
    container_name: bot_postgres_container
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: root
      POSTGRES_DB: bot_database
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d bot_database"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot_app:
    build: .
    container_name: tg_bot_container
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://admin:root@db:5432/bot_database
    command: sh -c "python init_db.py && python parser.py && python bot.py"

volumes:
  pgdata:
